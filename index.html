<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Terminal Hacker</title>
<style>
    body {
        background-color: black;
        color: #00FF00;
        font-family: Consolas, monospace;
        white-space: pre;
    }
    #terminal {
        width: 90ch;
        height: 35em;
        overflow-y: scroll;
    }
</style>
</head>
<body>

<div id="terminal"></div>

<script>
const terminal = document.getElementById("terminal");

// ---------------- Funções utilitárias ----------------
function escrever(msg, velocidade=1) { // antes 10 ou 2
    return new Promise(resolve => {
        let i = 0;
        function loop() {
            if(i < msg.length) {
                terminal.textContent += msg[i];
                terminal.scrollTop = terminal.scrollHeight;
                i++;
                setTimeout(loop, velocidade);
            } else {
                terminal.textContent += "\n";
                terminal.scrollTop = terminal.scrollHeight;
                resolve();
            }
        }
        loop();
    });
}

function limpar() {
    terminal.textContent = "";
}

// ---------------- Caveira piscando ----------------
async function caveira() {
    const skull = [

`
░░█░░░░█▀▀▀█░█▀▀█░█▀▀▄░▀█▀░█▄░░█░█▀▀█░░
░░█░░░░█░░░█░█▄▄█░█░░█░░█░░█░█░█░█░▄▄░░
░░█▄▄█░█▄▄▄█░█░░█░█▄▄▀░▄█▄░█░░▀█░█▄▄█░░
`
    ];
    for(let _=0; _<1; _++) {
        limpar();
        await escrever(skull.join("\n"), 1); // mais rápido
        await new Promise(r => setTimeout(r, 50)); // antes 200
        limpar();
        await new Promise(r => setTimeout(r, 25)); // antes 100
    }
}

// ---------------- Efeito Matrix ----------------
async function matrix_efeito(linhas=5, colunas=5, tempo=0) {
    const chars = "01";
    for(let _=0; _<1; _++) {
        let linha = "";
        for(let i=0; i<colunas; i++){
            linha += chars[Math.floor(Math.random()*chars.length)];
        }
        await escrever(linha, tempo); // tempo já rápido
    }
}

// ---------------- NAYLER e RITA ----------------
async function mostrar_nayler_rita() {
    const ascii_art = [
"                                                                               ",
" mm    mm     mm        mmmm   mm   mmm  mmmmmmmm     mm     mmmmm       mmmm   ",
" ##    ##    ####     ##\"\"\"\"#  ##  ##\"   ##\"\"\"\"\"\"    ####    ##\"\"\"##    ##\"\"##  ",
" ##    ##    ####    ##\"       ##m##     ##          ####    ##    ##  ##    ## ",
" ########   ##  ##   ##        #####     #######    ##  ##   ##    ##  ##    ## ",
" ##    ##   ######   ##m       ##  ##m   ##         ######   ##    ##  ##    ## ",
" ##    ##  m##  ##m   ##mmmm#  ##   ##m  ##mmmmmm  m##  ##m  ##mmm##    ##mm##  ",
" \"\"    \"\"  \"\"    \"\"     \"\"\"\"   \"\"    \"\"  \"\"\"\"\"\"\"\"  \"\"    \"\"  \"\"\"\"\"       \"\"\"\"   ",
"                                                                               "
    ];
    limpar();
    await escrever(ascii_art.join("\n"), 1);
}

// ---------------- HACKEADO ----------------
async function mostrar_hackeado() {
    const hackeado_ascii = [
"  / |/ / _ \\ \\/ / /  / __/ _ \\",
" /    / __ |\\  / /__/ _// , _/",
"/_/|_/_/_|_|/_/____/___/_/|_|",
"     / __/                    ",
"    / _/                       ",
"   /___/_____________           ",
"  / _ \\/  _/_  __/ _ |        ",
" / , _// /  / / / __ |        ",
"/_/|_/___/ /_/ /_/ |_|         "
    ];
    for(let _=0; _<1; _++) {
        limpar();
        await escrever(hackeado_ascii.join("\n"), 1);
        await new Promise(r => setTimeout(r, 50)); // antes 200
        limpar();
        await new Promise(r => setTimeout(r, 25)); // antes 100
    }
    await escrever(hackeado_ascii.join("\n"), 1);
}

// ---------------- Sequência principal ----------------
async function rodar() {
    await caveira();
    await new Promise(r => setTimeout(r, 50)); // antes 500
    for(let i=0; i<5; i++){
        await matrix_efeito(10, 80, 0);
    }
    await new Promise(r => setTimeout(r, 50)); // antes 500
    await mostrar_nayler_rita();
    await new Promise(r => setTimeout(r, 50)); // antes 1000
    await mostrar_hackeado();
    await escrever("PROCESSO CONCLUÍDO 💀 SEU CELULAR FOI INVADIDO!", 5);
    await escrever("VOCÊ ME DEVE 💀 UMA CERVEJA!", 5);
    await escrever("BRI N CA DE I RA !", 20);
}

rodar();
</script>
