// ---------------- Fun√ß√Ķes utilit√°rias ----------------
function escrever(msg, velocidade=10) {
    return new Promise(resolve => {
        let i = 0;
        function loop() {
            if(i < msg.length) {
                terminal.textContent += msg[i];
                terminal.scrollTop = terminal.scrollHeight;
                i++;
                setTimeout(loop, velocidade);
            } else {
                terminal.textContent += "\n";
                terminal.scrollTop = terminal.scrollHeight;
                resolve();
            }
        }
        loop();
    });
}

function limpar() {
    terminal.textContent = "";
}

// ---------------- Efeito Matrix ----------------
async function matrix_efeito(linhas=5, colunas=5, tempo=0) {
    const chars = "01";
    for(let _=0; _<1; _++) {
        let linha = "";
        for(let i=0; i<colunas; i++){
            linha += chars[Math.floor(Math.random()*chars.length)];
        }
        await escrever(linha, tempo);
    }
}
