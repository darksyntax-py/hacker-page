// ---------------- Fun√ß√Ķes utilit√°rias ----------------
function escrever(msg, velocidade=1) {
    return new Promise(resolve => {
        let i = 0;
        function loop() {
            if(i < msg.length) {
                terminal.textContent += msg[i];
                terminal.scrollTop = terminal.scrollHeight;
                i++;
                setTimeout(loop, velocidade);
            } else {
                terminal.textContent += "\n";
                terminal.scrollTop = terminal.scrollHeight;
                resolve();
            }
        }
        loop();
    });
}

function limpar() {
    terminal.textContent = "";
}

    }
}
